name: e2e-nightly

# The FULL blueprint suite, including the auth-gated publish + learning-loop
# scenarios that hit real GitHub fixtures and run a real `claude -p` session.
# These can't run on every PR (they need secrets + real network side effects), so
# they run nightly and on demand. The auth-free subset runs per-PR in ci.yml.
#
# Required repo secrets (set in Settings → Secrets and variables → Actions):
#   E2E_GH_TOKEN            — a PAT that can fork/PR/push to the publish fixtures
#                             (agentteamland/atl-e2e-team + <login>/atl-e2e-owned)
#   CLAUDE_CODE_OAUTH_TOKEN — `claude setup-token` output, for the learning-loop
#                             blueprint's real `claude -p` session
# If a secret is absent, run.sh skips that blueprint (the run still passes on the
# rest), so this workflow degrades gracefully until both secrets are configured.

on:
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  full-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run the full e2e blueprint suite
        env:
          GH_TOKEN: ${{ secrets.E2E_GH_TOKEN }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: bash test/e2e/run.sh
