name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  # opt into Node.js 24 for JS actions ahead of the Node 20 removal (2026-09)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: cli/go.sum
      - name: Build
        working-directory: cli
        run: go build ./...
      - name: Vet
        working-directory: cli
        run: go vet ./...
      - name: Test
        working-directory: cli
        run: go test ./...

  e2e-auth-free:
    # The auth-free blueprints (install/promote/pin/doctor/update/list-remove)
    # run on every PR. run.sh skips the publish + learning-loop blueprints when
    # their auth is absent, and no gh/Claude token is provided here — so this job
    # never touches real GitHub. The full suite runs nightly (e2e-nightly.yml).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run auth-free e2e blueprints
        run: bash test/e2e/run.sh
