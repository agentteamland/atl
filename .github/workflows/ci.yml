name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  # opt into Node.js 24 for JS actions ahead of the Node 20 removal (2026-09)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: cli/go.sum
      - name: Build
        working-directory: cli
        run: go build ./...
      - name: Vet
        working-directory: cli
        run: go vet ./...
      - name: Test
        working-directory: cli
        run: go test ./...
